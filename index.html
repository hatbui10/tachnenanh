 <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool tách nền vùng chọn + xuất ảnh</title>
<style>


body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}


h2{text-align:center;margin-top:10px;}
.app{display:flex; max-width:1200px; margin:20px auto;}
.sidebar{
    width:15%;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-right:20px;
}


.sidebar label{margin-top:10px; display:block;}
.sidebar input, .sidebar button{
    width:90%;
    margin-top:5px;
    padding:8px;
    border-radius:6px;
    border:none;
    font-size:14px;
}



.sidebar button{
    background:#3b82f6; color:white;
    cursor:pointer;
    margin-top:12px;
     width:90%;
}


.workspace{flex:1; display:flex; justify-content:center; align-items:flex-start;}
.canvasBox{position:relative; background:#020617; padding:10px; border-radius:10px;}
canvas{border:1px solid #334155; border-radius:6px;}
#selection{
    position:absolute;
    border:2px dashed #ef4444;
    background:rgba(239,68,68,0.2);
    display:none;
}
</style>
</head>
<body>

<h2>Tool tách nền vùng chọn</h2>
<div class="app">
    <div class="sidebar">
        <label>Upload ảnh</label>
        <input type="file" id="upload">

        <label>Màu cần xóa (hex)</label>
        <input type="text" id="color" value="#ffffff">

        <label>Tolerance</label>
        <input type="number" id="tol" value="80">

        <button onclick="removeBg()">Tách nền vùng chọn</button>
        <button onclick="exportSelection()">Xuất vùng chọn</button>
    </div>

    <div class="workspace">
        <div class="canvasBox">
            <canvas id="canvas"></canvas>
            <div id="selection"></div>
        </div>
    </div>
</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const selection = document.getElementById("selection");

let img = new Image();
let startX,startY,endX,endY;
let selecting = false;

upload.onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = ev=>{
        img.onload = ()=>{
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img,0,0);
        }
        img.src = ev.target.result;
    }
    reader.readAsDataURL(file);
}

// Vẽ vùng chọn
canvas.addEventListener("mousedown", e=>{
    selecting=true;
    const rect=canvas.getBoundingClientRect();
    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;
    selection.style.left = startX+"px";
    selection.style.top = startY+"px";
    selection.style.width = "0px";
    selection.style.height = "0px";
    selection.style.display="block";
});
canvas.addEventListener("mousemove", e=>{
    if(!selecting) return;
    const rect=canvas.getBoundingClientRect();
    endX = e.clientX - rect.left;
    endY = e.clientY - rect.top;
    selection.style.left = Math.min(startX,endX)+"px";
    selection.style.top = Math.min(startY,endY)+"px";
    selection.style.width = Math.abs(endX-startX)+"px";
    selection.style.height = Math.abs(endY-startY)+"px";
});
canvas.addEventListener("mouseup", e=>{ selecting=false; });

// HEX → RGB
function hexToRgb(hex){
    hex=hex.replace("#","");
    return{
        r:parseInt(hex.substring(0,2),16),
        g:parseInt(hex.substring(2,4),16),
        b:parseInt(hex.substring(4,6),16)
    };
}

// Tách nền
function removeBg(){
    if(startX===undefined) return alert("Chưa chọn vùng!");
    const tol=parseInt(document.getElementById("tol").value);
    const rgb=hexToRgb(document.getElementById("color").value);

    let x = Math.min(startX,endX);
    let y = Math.min(startY,endY);
    let w = Math.abs(endX-startX);
    let h = Math.abs(endY-startY);

    let imgData = ctx.getImageData(x,y,w,h);
    let data = imgData.data;
    for(let i=0;i<data.length;i+=4){
        if(Math.abs(data[i]-rgb.r)<tol &&
           Math.abs(data[i+1]-rgb.g)<tol &&
           Math.abs(data[i+2]-rgb.b)<tol){
               data[i+3]=0;
           }
    }
    ctx.putImageData(imgData,x,y);
}

// Xuất vùng chọn
function exportSelection(){
    if(startX===undefined) return alert("Chưa chọn vùng!");
    let x = Math.min(startX,endX);
    let y = Math.min(startY,endY);
    let w = Math.abs(endX-startX);
    let h = Math.abs(endY-startY);

    if(w===0 || h===0) return alert("Vùng chọn không hợp lệ!");

    // Tạo canvas tạm
    const tempCanvas = document.createElement("canvas");
    const tCtx = tempCanvas.getContext("2d");
    tempCanvas.width = w;
    tempCanvas.height = h;

    // Lấy ảnh từ vùng chọn
    const imgData = ctx.getImageData(x,y,w,h);
    tCtx.putImageData(imgData,0,0);

    // Xuất PNG
    const link = document.createElement("a");
    link.download = "selection.png";
    link.href = tempCanvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
