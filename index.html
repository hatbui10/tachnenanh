<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool chỉnh ảnh + tách nền</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0f172a;
color:#e2e8f0;
}

.title{
text-align:center;
padding:10px;
font-size:22px;
font-weight:600;
}

.app{
display:flex;
min-height:calc(100vh - 60px);
max-width:1600px;
margin:auto;
}

/* sidebar */

.sidebar{
width:360px;
background:#1e293b;
padding:20px;
overflow:auto;
box-shadow:4px 0 20px rgba(0,0,0,0.4);
margin-top:30px;
height:fit-content;
}

label{
display:block;
margin-top:10px;
font-size:13px;
}

input{
width:100%;
padding:6px;
margin-top:4px;
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:6px;
}

input[type=range]{ padding:0; }

button{
margin-top:10px;
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{ background:#2563eb; }

.section{
margin-top:20px;
font-weight:600;
color:#cbd5f5;
}

/* canvas */

.workspace{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
margin-top:20px;
}

.canvasBox{
position:relative;
background:#020617;
padding:30px;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
display:flex;
justify-content:center;
max-width:900px;
}

canvas{
border-radius:8px;
border:1px solid #334155;
}

#selection{
position:absolute;
border:2px dashed #ef4444;
background:rgba(239,68,68,0.15);
pointer-events:none;
}

</style>
</head>

<body>

<h2 class="title">Tool chỉnh ảnh + tách nền</h2>

<div class="app">

<div class="sidebar">

<label>Chọn ảnh</label>
<input type="file" id="upload">

<label>Mã màu cần xóa</label>
<input type="text" id="color" value="#ffffff">

<label>Tolerance</label>
<input type="number" id="tol" value="80">

<button onclick="removeBg()">Tách nền vùng chọn</button>

<div class="section">Sáng</div>

<label>Độ sáng</label>
<input type="range" id="brightness" min="-100" max="100" value="0">

<label>Tiếp xúc</label>
<input type="range" id="exposure" min="-100" max="100" value="0">

<label>Ngược lại</label>
<input type="range" id="contrast" min="-100" max="100" value="0">

<label>Nổi bật</label>
<input type="range" id="highlights" min="-100" max="100" value="0">

<label>Bóng</label>
<input type="range" id="shadows" min="-100" max="100" value="0">

<label>Mờ nét</label>
<input type="range" id="blur" min="0" max="10" value="0">


<div class="section">Màu sắc</div>

<label>Bão hòa</label>
<input type="range" id="saturation" min="-100" max="100" value="0">

<label>Độ ấm</label>
<input type="range" id="warmth" min="-100" max="100" value="0">

<label>Sắc thái</label>
<input type="range" id="tint" min="-100" max="100" value="0">

<label>Độ sắc nét</label>
<input type="range" id="sharpness" min="0" max="5" value="0">
</div>




<div class="workspace">

<div class="canvasBox">

<canvas id="canvas"></canvas>
<div id="selection"></div>

</div>

</div>

</div>

<script>



const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const upload = document.getElementById("upload");

let img = new Image();
let ratio = 1;
let maxWidth = 600;

let startX,startY,endX,endY;
let selecting=false;

let zoom = 1;
let offsetX = 0;
let offsetY = 0;

const selectionBox=document.getElementById("selection");

/* LOAD ẢNH */

upload.onchange=e=>{

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(ev){

img.onload=function(){

ratio = img.width > maxWidth ? maxWidth / img.width : 1;

canvas.width = img.width * ratio;
canvas.height = img.height * ratio;

drawImage();

}

img.src=ev.target.result;

}

reader.readAsDataURL(file);

};

/* VẼ ẢNH */

function drawImage(){

ctx.clearRect(0,0,canvas.width,canvas.height);

let brightness=document.getElementById("brightness").value;
let contrast=document.getElementById("contrast").value;
let saturation=document.getElementById("saturation").value;
let blur=document.getElementById("blur").value;

ctx.filter=
`brightness(${100+parseInt(brightness)}%)
contrast(${100+parseInt(contrast)}%)
saturate(${100+parseInt(saturation)}%)
blur(${blur}px)`;

let w = img.width * ratio * zoom;
let h = img.height * ratio * zoom;

ctx.drawImage(img, offsetX, offsetY, w, h);

applyAdvancedAdjustments();

}

/* PIXEL PROCESSING */

function applyAdvancedAdjustments(){

let exposure = document.getElementById("exposure").value/100;
let highlights = document.getElementById("highlights").value/100;
let shadows = document.getElementById("shadows").value/100;
let warmth = document.getElementById("warmth").value;
let tint = document.getElementById("tint").value;
let sharpness = document.getElementById("sharpness").value;

let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
let data = imgData.data;

for(let i=0;i<data.length;i+=4){

let r=data[i];
let g=data[i+1];
let b=data[i+2];

let avg=(r+g+b)/3;

/* exposure */

r=r*(1+exposure);
g=g*(1+exposure);
b=b*(1+exposure);

/* highlights */

if(avg>180){
r+=highlights*50;
g+=highlights*50;
b+=highlights*50;
}

/* shadows */

if(avg<80){
r+=shadows*50;
g+=shadows*50;
b+=shadows*50;
}

/* warmth */

r+=warmth*0.5;
b-=warmth*0.5;

/* tint */

g+=tint*0.5;

/* clamp */

data[i]=Math.max(0,Math.min(255,r));
data[i+1]=Math.max(0,Math.min(255,g));
data[i+2]=Math.max(0,Math.min(255,b));

}

ctx.putImageData(imgData,0,0);

/* sharpness */

if(sharpness>0){
sharpen(sharpness);
}

}

/* SHARPEN */

function sharpen(amount){

let w=canvas.width;
let h=canvas.height;

let imgData=ctx.getImageData(0,0,w,h);
let data=imgData.data;

let copy=new Uint8ClampedArray(data);

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=(y*w+x)*4;

for(let c=0;c<3;c++){

let val=
copy[i+c]*(1+4*amount)
-copy[i-4+c]*amount
-copy[i+4+c]*amount
-copy[i-w*4+c]*amount
-copy[i+w*4+c]*amount;

data[i+c]=Math.max(0,Math.min(255,val));

}

}

}

ctx.putImageData(imgData,0,0);

}

/* ZOOM */

canvas.addEventListener("wheel",e=>{

e.preventDefault();

if(e.deltaY<0){
zoom*=1.1;
}else{
zoom*=0.9;
}

zoom=Math.max(0.2,Math.min(zoom,10));

drawImage();

});

/* DRAG */

let dragging=false;
let lastX,lastY;

canvas.addEventListener("mousedown",e=>{
dragging=true;
lastX=e.clientX;
lastY=e.clientY;
});

canvas.addEventListener("mousemove",e=>{

if(!dragging) return;

offsetX+=e.clientX-lastX;
offsetY+=e.clientY-lastY;

lastX=e.clientX;
lastY=e.clientY;

drawImage();

});

canvas.addEventListener("mouseup",()=>{

dragging=false;

});

/* SLIDER */

document.querySelectorAll("input[type=range]").forEach(s=>{

s.addEventListener("input",drawImage);

});

/* VÙNG CHỌN */

canvas.addEventListener("mousedown",e=>{

selecting=true;

const rect=canvas.getBoundingClientRect();

startX=e.clientX-rect.left;
startY=e.clientY-rect.top;

selectionBox.style.left=startX+"px";
selectionBox.style.top=startY+"px";

});

canvas.addEventListener("mousemove",e=>{

if(!selecting) return;

const rect=canvas.getBoundingClientRect();

endX=e.clientX-rect.left;
endY=e.clientY-rect.top;

selectionBox.style.left=Math.min(startX,endX)+"px";
selectionBox.style.top=Math.min(startY,endY)+"px";

selectionBox.style.width=Math.abs(endX-startX)+"px";
selectionBox.style.height=Math.abs(endY-startY)+"px";

});

canvas.addEventListener("mouseup",()=>{

selecting=false;

});

/* HEX → RGB */

function hexToRgb(hex){

hex=hex.replace("#","");

return{
r:parseInt(hex.substring(0,2),16),
g:parseInt(hex.substring(2,4),16),
b:parseInt(hex.substring(4,6),16)
};

}

/* TÁCH NỀN */

function removeBg(){

let tol=parseInt(document.getElementById("tol").value);
let rgb=hexToRgb(document.getElementById("color").value);

let x=Math.min(startX,endX);
let y=Math.min(startY,endY);
let w=Math.abs(endX-startX);
let h=Math.abs(endY-startY);

let imgData=ctx.getImageData(x,y,w,h);
let data=imgData.data;

for(let i=0;i<data.length;i+=4){

let r=data[i];
let g=data[i+1];
let b=data[i+2];

if(
Math.abs(r-rgb.r)<tol &&
Math.abs(g-rgb.g)<tol &&
Math.abs(b-rgb.b)<tol
){
data[i+3]=0;
}

}

ctx.putImageData(imgData,x,y);

}

</script>
</script>

</body>
</html>
