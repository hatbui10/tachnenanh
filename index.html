<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tách nền chuyên nghiệp - Zoom & Pan</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --accent: #3b82f6; --text: #e2e8f0; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--sidebar); padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .sidebar label { font-size: 12px; font-weight: bold; color: #94a3b8; margin-top: 5px; }
        
        /* Workspace */
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #020617; overflow: hidden; }
        
        /* Canvas chuyên dụng cho Zoom/Pan */
        .canvas-container { position: relative; border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; background-image: conic-gradient(#1e293b 90deg, #0f172a 90deg 180deg, #1e293b 180deg 270deg, #0f172a 270deg); background-size: 20px 20px; cursor: move; }
        
        input, select, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        button:hover { background: #2563eb; }
        
        .info-panel { background: #020617; padding: 10px; border-radius: 6px; font-size: 13px; line-height: 1.6; border: 1px solid #334155; }
        .info-panel span { color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center; margin:0 0 10px 0; font-size: 18px;">Cắt Ảnh & Tách Nền</h2>
    
    <label>1. UPLOAD ẢNH</label>
    <input type="file" id="upload" accept="image/*">

    <label>2. CHỌN KHUNG HÌNH (TỶ LỆ)</label>
    <select id="ratioMode" onchange="updateViewport()">
        <option value="4/6">Ảnh thẻ 4:6</option>
        <option value="3/4">Ảnh thẻ 3:4</option>
        <option value="custom">Kích thước tùy chỉnh (px)</option>
    </select>

    <div id="customSizeInputs" style="display:none; gap:5px;">
        <input type="number" id="customW" placeholder="Rộng" value="2048" oninput="updateViewport()">
        <input type="number" id="customH" placeholder="Cao" value="2048" oninput="updateViewport()">
    </div>

    <div class="info-panel">
        Khung thực tế: <span id="realDim">0 x 0</span> px<br>
        Tỷ lệ Zoom: <span id="zoomVal">100%</span>
    </div>

    <label>3. THÔNG SỐ TÁCH NỀN</label>
    <div style="display:flex; gap:5px;">
        <input type="color" id="colorPicker" value="#ffffff" style="width:60px; height:40px; padding:2px;">
        <input type="text" id="colorHex" value="#ffffff" oninput="syncColor(this.value)">
    </div>
    
    <label>Tolerance (Độ nhạy): <span id="tolLabel">60</span></label>
    <input type="range" id="tol" min="0" max="150" value="60" oninput="document.getElementById('tolLabel').innerText=this.value">

    <button onclick="applyRemoveBg()">Tách nền vùng trong khung</button>
    <hr style="width:100%; border:0; border-top:1px solid #334155; margin:10px 0;">
    <button onclick="saveFinalImage()" style="background:#10b981;">Xuất vùng chọn sắc nét</button>

    <div style="font-size: 11px; color: #94a3b8; margin-top: 10px;">
        * Cuộn chuột để Phóng to/Thu nhỏ<br>
        * Kéo chuột để di chuyển ảnh vào khung xanh.
    </div>
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let img = new Image();
let originalImageData = null;
let imgLoaded = false;

// Trạng thái điều khiển ảnh
let scale = 1, posX = 0, posY = 0;
let isDragging = false, startDragX, startDragY;

function syncColor(val) { document.getElementById('colorPicker').value = val; }

// Khởi tạo/Cập nhật khung nhìn
function updateViewport() {
    const mode = document.getElementById('ratioMode').value;
    const customDiv = document.getElementById('customSizeInputs');
    let w, h;

    if (mode === '4/6') { w = 800; h = 1200; customDiv.style.display = 'none'; }
    else if (mode === '3/4') { w = 900; h = 1200; customDiv.style.display = 'none'; }
    else {
        w = parseInt(document.getElementById('customW').value) || 2048;
        h = parseInt(document.getElementById('customH').value) || 2048;
        customDiv.style.display = 'flex';
    }

    // Thiết lập kích thước thực tế cho Canvas
    canvas.width = w;
    canvas.height = h;

    // Giới hạn hiển thị trên giao diện (CSS) để không tràn màn hình
    const maxDisplay = 600;
    let ratio = Math.min(maxDisplay / w, maxDisplay / h);
    canvas.style.width = (w * ratio) + "px";
    canvas.style.height = (h * ratio) + "px";

    document.getElementById('realDim').innerText = `${w} x ${h}`;
    render();
}

// Load ảnh
document.getElementById('upload').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        img.onload = () => {
            imgLoaded = true;
            // Scale ảnh để vừa khung ban đầu
            scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            posX = (canvas.width - img.width * scale) / 2;
            posY = (canvas.height - img.height * scale) / 2;
            
            // Lưu dữ liệu gốc để tách nền nhiều lần
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(img, 0, 0);
            originalImageData = tCtx.getImageData(0, 0, img.width, img.height);
            
            render();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

// Hàm vẽ ảnh lên canvas
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!imgLoaded) return;

    ctx.save();
    ctx.translate(posX, posY);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    ctx.restore();

    document.getElementById('zoomVal').innerText = Math.round(scale * 100) + "%";
}

// Điều khiển Pan (Di chuyển)
canvas.onmousedown = e => {
    if(!imgLoaded) return;
    isDragging = true;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    startDragX = e.clientX * factor - posX;
    startDragY = e.clientY * factor - posY;
};

window.onmousemove = e => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    posX = e.clientX * factor - startDragX;
    posY = e.clientY * factor - startDragY;
    render();
};

window.onmouseup = () => isDragging = false;

// Điều khiển Zoom (Cuộn chuột)
canvas.onwheel = e => {
    if(!imgLoaded) return;
    e.preventDefault();
    const zoomSpeed = 0.001;
    const delta = -e.deltaY;
    const oldScale = scale;
    scale *= (1 + delta * zoomSpeed);
    scale = Math.min(Math.max(0.01, scale), 20); // Giới hạn zoom

    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    const mouseX = e.clientX * factor;
    const mouseY = e.clientY * factor;

    posX = mouseX - (mouseX - posX) * (scale / oldScale);
    posY = mouseY - (mouseY - posY) * (scale / oldScale);
    render();
};

// LOGIC TÁCH NỀN (Tích hợp từ code của bạn)
function hexToRgb(hex){
    hex = hex.replace("#","");
    return {
        r: parseInt(hex.substring(0,2),16),
        g: parseInt(hex.substring(2,4),16),
        b: parseInt(hex.substring(4,6),16)
    };
}

function applyRemoveBg() {
    if (!imgLoaded) return alert("Chưa upload ảnh!");
    
    const tol = parseInt(document.getElementById("tol").value);
    const rgb = hexToRgb(document.getElementById("colorPicker").value);

    // Lấy dữ liệu điểm ảnh hiện tại trên khung hình
    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        let dr = data[i] - rgb.r;
        let dg = data[i+1] - rgb.g;
        let db = data[i+2] - rgb.b;

        let dist = Math.sqrt(dr*dr + dg*dg + db*db);

        if (dist < tol) {
            data[i+3] = 0; // Xóa hẳn
        } else if (dist < tol * 1.5) {
            // Vùng rìa làm mềm viền (Anti-aliasing)
            let alpha = (dist - tol) / (tol * 0.5);
            data[i+3] = data[i+3] * alpha;
        }
    }
    ctx.putImageData(imgData, 0, 0);
}

// LOGIC XUẤT ẢNH SẮC NÉT (Tích hợp từ code của bạn)
function saveFinalImage() {
    if (!imgLoaded) return;

    // Tạo canvas tạm để xử lý filter tương phản như code gốc của bạn
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = canvas.width;
    exportCanvas.height = canvas.height;
    const eCtx = exportCanvas.getContext("2d");

    // Copy nội dung từ canvas chính
    const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    
    // Vẽ lên canvas xuất với filter
    eCtx.imageSmoothingEnabled = true;
    eCtx.imageSmoothingQuality = "high";
    eCtx.filter = "contrast(110%)"; // Giữ logic tăng tương phản của bạn
    
    // Tạo imageBitmap hoặc dùng canvas trung gian để áp filter
    createImageBitmap(currentFrame).then(bitmap => {
        eCtx.drawImage(bitmap, 0, 0);
        
        const link = document.createElement("a");
        link.download = `tach-nen-${exportCanvas.width}x${exportCanvas.height}.png`;
        link.href = exportCanvas.toDataURL("image/png", 1.0);
        link.click();
    });
}

// Khởi tạo lần đầu
updateViewport();
</script>
</body>
</html>
