<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tách nền - Zoom, Pan & Xoay 90°</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --accent: #3b82f6; --text: #e2e8f0; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 320px; background: var(--sidebar); padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .sidebar label { font-size: 12px; font-weight: bold; color: #94a3b8; margin-top: 5px; }
        
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #020617; overflow: hidden; }
        
        .canvas-container { position: relative; border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; background-image: conic-gradient(#1e293b 90deg, #0f172a 90deg 180deg, #1e293b 180deg 270deg, #0f172a 270deg); background-size: 20px 20px; cursor: move; }
        
        input, select, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-rotate { background: #6366f1; margin-top: 5px; }
        
        .info-panel { background: #020617; padding: 10px; border-radius: 6px; font-size: 13px; border: 1px solid #334155; }
        .info-panel span { color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center; margin:0 0 10px 0; font-size: 18px;">Công cụ Cắt & Xoay Ảnh</h2>
    
    <label>1. UPLOAD ẢNH</label>
    <input type="file" id="upload" accept="image/*">

    <label>2. ĐIỀU CHỈNH ẢNH</label>
    <button class="btn-rotate" onclick="rotateImage()">🔄 Xoay ảnh 90°</button>

    <label>3. CHỌN KHUNG HÌNH</label>
    <select id="ratioMode" onchange="updateViewport()">
        <option value="4/6">Ảnh thẻ 4:6</option>
        <option value="3/4">Ảnh thẻ 3:4</option>
        <option value="custom">Tùy chỉnh (px)</option>
    </select>

    <div id="customSizeInputs" style="display:none; gap:5px;">
        <input type="number" id="customW" placeholder="W" value="2048" oninput="updateViewport()">
        <input type="number" id="customH" placeholder="H" value="2048" oninput="updateViewport()">
    </div>

    <div class="info-panel">
        Khung: <span id="realDim">0 x 0</span> px<br>
        Zoom: <span id="zoomVal">100%</span> | Xoay: <span id="rotVal">0°</span>
    </div>

    <label>4. TÁCH NỀN</label>
    <div style="display:flex; gap:5px;">
        <input type="color" id="colorPicker" value="#ffffff" style="width:60px; height:40px; padding:2px;">
        <input type="range" id="tol" min="0" max="150" value="60" oninput="document.getElementById('tolLabel').innerText=this.value">
    </div>
    <div style="font-size:12px; color:#94a3b8">Tolerance: <span id="tolLabel">60</span></div>

    <button onclick="applyRemoveBg()">Tách nền trong khung</button>
    <hr style="width:100%; border:0; border-top:1px solid #334155; margin:10px 0;">
    <button onclick="saveFinalImage()" style="background:#10b981;">Xuất ảnh sắc nét</button>
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let img = new Image();
let imgLoaded = false;

// Trạng thái điều khiển
let scale = 1, posX = 0, posY = 0, rotation = 0; 
let isDragging = false, startDragX, startDragY;

function updateViewport() {
    const mode = document.getElementById('ratioMode').value;
    const customDiv = document.getElementById('customSizeInputs');
    let w, h;

    if (mode === '4/6') { w = 800; h = 1200; customDiv.style.display = 'none'; }
    else if (mode === '3/4') { w = 900; h = 1200; customDiv.style.display = 'none'; }
    else {
        w = parseInt(document.getElementById('customW').value) || 2048;
        h = parseInt(document.getElementById('customH').value) || 2048;
        customDiv.style.display = 'flex';
    }

    canvas.width = w;
    canvas.height = h;

    const maxDisplay = 600;
    let r = Math.min(maxDisplay / w, maxDisplay / h);
    canvas.style.width = (w * r) + "px";
    canvas.style.height = (h * r) + "px";

    document.getElementById('realDim').innerText = `${w} x ${h}`;
    render();
}

upload.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        img.onload = () => {
            imgLoaded = true;
            rotation = 0; // Reset xoay khi tải ảnh mới
            scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            posX = canvas.width / 2; // Đặt vị trí ảnh vào giữa khung
            posY = canvas.height / 2;
            render();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

// Hàm xoay ảnh thêm 90 độ
function rotateImage() {
    if (!imgLoaded) return;
    rotation = (rotation + 90) % 360;
    document.getElementById('rotVal').innerText = rotation + "°";
    render();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!imgLoaded) return;

    ctx.save();
    // Di chuyển canvas đến vị trí posX, posY (tâm của ảnh)
    ctx.translate(posX, posY);
    // Thực hiện xoay
    ctx.rotate(rotation * Math.PI / 180);
    // Thực hiện scale
    ctx.scale(scale, scale);
    // Vẽ ảnh (vẽ từ tâm ảnh lùi về góc để ảnh nằm chính giữa điểm translate)
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    ctx.restore();

    document.getElementById('zoomVal').innerText = Math.round(scale * 100) + "%";
}

// Điều khiển Pan (Di chuyển)
canvas.onmousedown = e => {
    if(!imgLoaded) return;
    isDragging = true;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    startDragX = e.clientX * factor - posX;
    startDragY = e.clientY * factor - posY;
};

window.onmousemove = e => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    posX = e.clientX * factor - startDragX;
    posY = e.clientY * factor - startDragY;
    render();
};

window.onmouseup = () => isDragging = false;

// Điều khiển Zoom
canvas.onwheel = e => {
    if(!imgLoaded) return;
    e.preventDefault();
    const oldScale = scale;
    scale *= (1 + (-e.deltaY) * 0.001);
    scale = Math.min(Math.max(0.01, scale), 20);

    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    const mouseX = e.clientX * factor;
    const mouseY = e.clientY * factor;

    posX = mouseX - (mouseX - posX) * (scale / oldScale);
    posY = mouseY - (mouseY - posY) * (scale / oldScale);
    render();
};

// Logic Tách Nền (RGBA)
function applyRemoveBg() {
    if (!imgLoaded) return;
    const tol = parseInt(document.getElementById("tol").value);
    const hex = document.getElementById("colorPicker").value;
    const rT = parseInt(hex.substring(1,3), 16), gT = parseInt(hex.substring(3,5), 16), bT = parseInt(hex.substring(5,7), 16);

    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        let dist = Math.sqrt((data[i]-rT)**2 + (data[i+1]-gT)**2 + (data[i+2]-bT)**2);
        if (dist < tol) { data[i+3] = 0; }
        else if (dist < tol * 1.5) { data[i+3] *= (dist - tol) / (tol * 0.5); }
    }
    ctx.putImageData(imgData, 0, 0);
}

// Xuất ảnh sắc nét
function saveFinalImage() {
    if (!imgLoaded) return;
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = canvas.width;
    exportCanvas.height = canvas.height;
    const eCtx = exportCanvas.getContext("2d");

    eCtx.imageSmoothingEnabled = true;
    eCtx.imageSmoothingQuality = "high";
    eCtx.filter = "contrast(110%)"; // Giữ filter tương phản 
    eCtx.drawImage(canvas, 0, 0);

    const link = document.createElement("a");
    link.download = `photo-edit-${canvas.width}x${canvas.height}.png`;
    link.href = exportCanvas.toDataURL("image/png", 1.0);
    link.click();
}

updateViewport();
</script>
</body>
</html>
