<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Zoom & Pan - Tách nền chuyên nghiệp</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --accent: #3b82f6; --text: #e2e8f0; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--sidebar); padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #020617; overflow: hidden; }
        
        canvas { background-image: conic-gradient(#1e293b 90deg, #0f172a 90deg 180deg, #1e293b 180deg 270deg, #0f172a 270deg); background-size: 20px 20px; cursor: move; border: 2px solid var(--accent); }
        
        input, select, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #2563eb; }
        
        .hint { font-size: 12px; color: #94a3b8; line-height: 1.5; }
        .size-info { background: #020617; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Cấu hình khung</h3>
    <label>1. Tải ảnh</label>
    <input type="file" id="upload" accept="image/*">

    <label>2. Tỷ lệ khung (Output)</label>
    <select id="ratio" onchange="initViewport()">
        <option value="4/6">Ảnh thẻ 4:6</option>
        <option value="3/4">Ảnh thẻ 3:4</option>
        <option value="custom">Kích thước tùy chỉnh</option>
    </select>

    <div id="customSize" style="display:none; display:flex; gap:5px;">
        <input type="number" id="customW" placeholder="W" value="800" oninput="initViewport()">
        <input type="number" id="customH" placeholder="H" value="1200" oninput="initViewport()">
    </div>

    <div class="size-info">
        Khung: <span id="viewSize">0x0</span><br>
        Zoom: <span id="zoomLevel">100%</span>
    </div>

    <label>3. Tách nền</label>
    <div style="display:flex; gap:5px;">
        <input type="color" id="color" value="#ffffff" style="width:50px; padding:2px;">
        <input type="range" id="tol" min="0" max="150" value="60">
    </div>
    
    <button onclick="removeBg()">1. Xóa nền trong khung</button>
    <button onclick="exportImg()" style="background:#10b981;">2. Xuất ảnh đã khớp</button>

    <div class="hint">
        • <b>Cuộn chuột</b> để Phóng to/Thu nhỏ<br>
        • <b>Kéo chuột</b> để Di chuyển ảnh<br>
        • Ảnh xuất ra sẽ lấy đúng phần nằm trong khung xanh.
    </div>
</div>

<div class="workspace">
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = new Image();
let imgLoaded = false;

// Trạng thái ảnh
let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startDragX, startDragY;

// Khởi tạo khung nhìn (Viewport)
function initViewport() {
    const ratioVal = document.getElementById('ratio').value;
    const customSize = document.getElementById('customSize');
    let w, h;

    if (ratioVal === '4/6') { w = 400; h = 600; customSize.style.display = 'none'; }
    else if (ratioVal === '3/4') { w = 300; h = 400; customSize.style.display = 'none'; }
    else {
        w = parseInt(document.getElementById('customW').value) || 400;
        h = parseInt(document.getElementById('customH').value) || 400;
        customSize.style.display = 'flex';
    }

    // Giới hạn hiển thị trên màn hình nếu quá lớn
    const maxDisplay = 600;
    let displayW = w, displayH = h;
    if (w > maxDisplay || h > maxDisplay) {
        const factor = maxDisplay / Math.max(w, h);
        displayW = w * factor;
        displayH = h * factor;
    }

    canvas.width = w;
    canvas.height = h;
    canvas.style.width = displayW + "px";
    canvas.style.height = displayH + "px";
    
    document.getElementById('viewSize').innerText = `${w}x${h}`;
    draw();
}

// Load ảnh
document.getElementById('upload').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = f => {
        img.onload = () => {
            imgLoaded = true;
            // Tự động scale ảnh vừa khung ban đầu
            scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            posX = (canvas.width - img.width * scale) / 2;
            posY = (canvas.height - img.height * scale) / 2;
            draw();
        };
        img.src = f.target.result;
    };
    reader.readAsDataURL(file);
};

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!imgLoaded) return;

    ctx.save();
    ctx.translate(posX, posY);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    ctx.restore();

    document.getElementById('zoomLevel').innerText = Math.round(scale * 100) + "%";
}

// Xử lý di chuyển (Pan)
canvas.onmousedown = e => {
    isDragging = true;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    startDragX = e.clientX * factor - posX;
    startDragY = e.clientY * factor - posY;
};

window.onmousemove = e => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    posX = e.clientX * factor - startDragX;
    posY = e.clientY * factor - startDragY;
    draw();
};

window.onmouseup = () => isDragging = false;

// Xử lý phóng to/thu nhỏ (Zoom)
canvas.onwheel = e => {
    e.preventDefault();
    const zoomSpeed = 0.001;
    const delta = -e.deltaY;
    const oldScale = scale;
    scale *= (1 + delta * zoomSpeed);
    
    // Giới hạn zoom
    scale = Math.min(Math.max(0.05, scale), 10);

    // Zoom vào tâm chuột
    const rect = canvas.getBoundingClientRect();
    const factor = canvas.width / rect.width;
    const mouseX = e.clientX * factor;
    const mouseY = e.clientY * factor;

    posX = mouseX - (mouseX - posX) * (scale / oldScale);
    posY = mouseY - (mouseY - posY) * (scale / oldScale);

    draw();
};

// Logic tách nền (Chỉ xử lý trong khung hiện hữu)
function removeBg() {
    if (!imgLoaded) return;
    const tol = parseInt(document.getElementById('tol').value);
    const hex = document.getElementById('color').value;
    const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        const d = Math.sqrt((data[i]-r)**2 + (data[i+1]-g)**2 + (data[i+2]-b)**2);
        if (d < tol) data[i+3] = 0;
        else if (d < tol * 1.5) data[i+3] *= (d - tol) / (tol * 0.5);
    }
    ctx.putImageData(imgData, 0, 0);
}

// Xuất ảnh
function exportImg() {
    const link = document.createElement('a');
    link.download = 'output.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
}

// Khởi tạo mặc định
initViewport();
</script>
</body>
</html>
